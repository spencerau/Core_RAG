backend: mlx  # options: ollama, vllm, mlx

embedding:
  model: qwen3-embedding
  host: localhost
  # host: 192.168.200.110
  port: 11434
  dimensions: 4096  # qwen3-embedding output dimension
  batch_size: 32
  timeout: 120
  keep_alive: 30m
  retry_attempts: 10  # Increased to handle Ollama's sporadic EOF errors
  retry_delay: 2.0   # Longer initial delay to let Ollama recover
  #With batch_size: 8 and rate_limit_delay: 1.0, when you have a document with 10 chunks, it will:
  #Process chunks 1-8 (with 1 second delay between each = 8 seconds)
  #Process chunks 9-10 (2 more seconds)
  rate_limit_delay: 1.0

reranker:
  model: BAAI/bge-reranker-v2-m3 # ollama doesnt support reranking so just using HF 
  top_k_rerank: 12
  batch_size: 32
  max_candidates_for_rerank: 200
  activation: sigmoid

llm:
  host: localhost
  port: 8080
  #primary_model: qwen3.5:35b
  # primary_model: Jackrong/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled
  primary_model: Jackrong/Qwen3.5-35B-A3B-Claude-4.6-Opus-Reasoning-Distilled
  temperature: 0.1
  max_tokens: 20000
  num_ctx: 128000
  thinking_budget: 6000
  timeout: 300
  system_prompt: "This is just a test for the core rag pipeline. Answer questions based on the provided (rag) context"

intermediate_llm:
  host: localhost
  # host: 192.168.200.110
  port: 8081
  #model: qwen3.5:4b
  model: Jackrong/Qwen3.5-9B-Claude-4.6-Opus-Reasoning-Distilled
  temperature: 0.1
  max_tokens: 3500
  timeout: 210
  think: true
  # Sampling params to reduce overthinking in thinking models (recommendations for qwen3.5):
  # Ollama uses repeat_penalty instead of repetition_penalty
  sampling:
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
    repeat_penalty: 1.15
